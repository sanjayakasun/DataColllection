<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recruitment Data Collection</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins;background:#f2f4f8;margin:0;}
.header{
background:linear-gradient(135deg,#003366,#0055aa);
color:white;text-align:center;padding:30px;
animation:fade 1s ease-in-out;}
.container{
max-width:1100px;margin:30px auto;
background:white;padding:30px;border-radius:8px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);}
.section{margin-bottom:40px;}
.section h2{color:#0055aa;border-left:5px solid #0055aa;padding-left:10px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;}
input,select,textarea{
padding:10px;border:1px solid #ccc;border-radius:6px;width:100%;}
button{
background:#0055aa;color:white;padding:12px 25px;
border:none;border-radius:6px;cursor:pointer;}
button:hover{background:#003366;}
.error{color:red;font-size:13px;}
.success{color:green;font-weight:600;}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
</style>
</head>
<body>

<div class="header">
<h1>Open Competitive Examination – 2nd Round Data Collection</h1>
</div>

<div class="container">
<form id="form">

<!-- PERSONAL INFORMATION -->
<div class="section">
<h2>Personal Information</h2>
<div class="grid">

<input name="callingNumber" placeholder="Interview Calling Number" required>
<input name="nameSinhala" placeholder="Name with initials (Sinhala/Tamil)" required>
<input name="nameEnglish" placeholder="Name with initials (English)" required>

<select name="prefix" required>
<option value="">Prefix</option>
<option>Mr</option>
<option>Miss</option>
<option>Mrs</option>
</select>

<input name="fullNameSinhala" placeholder="Full Name (Sinhala/Tamil)" required>
<input name="fullNameEnglish" placeholder="Full Name (English)" required>
<input name="nic" id="nic" placeholder="NIC Number" required>
<select name="gender" required>
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<select name="civilStatus" required>
<option value="">Civil Status</option>
<option>Unmarried</option>
<option>Married</option>
</select>

<input name="mobile" id="mobile" placeholder="Mobile Number (07XXXXXXXX)" required>
<input name="whatsapp" placeholder="Whatsapp Number">

<input type="date" name="birthday" id="birthday" required>
<input name="age" id="age" placeholder="Age (Auto Calculated)" readonly>

<select name="district" required>
<option value="">Residential District</option>
<option>Colombo</option>
<option>Gampaha</option>
<option>Kaluthara</option>
<option>Matale</option>
<option>Kandy</option>
<option>Nuwaraeliya</option>
<option>Galle</option>
<option>Matara</option>
<option>Hambanthota</option>
<option>Jaffna</option>
<option>Mannar</option>
<option>Mullaitivu</option>
<option>Vavuniya</option>
<option>Trincomalee</option>
<option>Batticaloa</option>
<option>Ampara</option>
<option>Puttalam</option>
<option>Kurunagala</option>
<option>Anuradhapura</option>
<option>Polonnaruwa</option>
<option>Badulla</option>
<option>Monaragala</option>
<option>Kegalle</option>
<option>Rathnapura</option>
<option>Kilinochchi</option>
</select>

</div>
</div>

<!-- O/L -->
<div class="section">
<h2>GCE O/L Qualifications</h2>
<div class="grid">
<input name="olYear" placeholder="Exam Year" required>
<input name="olIndex" placeholder="Index Number" required>
<input name="maths" placeholder="Mathematics - Grade" required>
<input name="language" placeholder="Language - Grade" required>
<input name="sub3" placeholder="Subject 03">
<input name="sub4" placeholder="Subject 04">
<input name="sub5" placeholder="Subject 05">
<input name="sub6" placeholder="Subject 06">
<input name="sub7" placeholder="Subject 07">
<input name="sub8" placeholder="Subject 08">
<input name="sub9" placeholder="Subject 09">
<input name="sub10" placeholder="Subject 10">
</div>
</div>

<!-- A/L -->
<div class="section">
<h2>GCE A/L Qualifications</h2>
<div class="grid">
<input name="alYear" placeholder="Exam Year" required>
<input name="alIndex" placeholder="Index Number" required>
<input name="stream" placeholder="Subject Stream" required>
<input name="alSub1" placeholder="Subject 01 - Grade" required>
<input name="alSub2" placeholder="Subject 02 - Grade" required>
<input name="alSub3" placeholder="Subject 03 - Grade" required>

<select name="generalEnglish" required>
<option value="">General English Passed?</option>
<option>Yes</option>
<option>No</option>
</select>

<select name="geGrade">
<option value="">General English Grade</option>
<option>A</option>
<option>B</option>
<option>C</option>
<option>S</option>
<option>F</option>
</select>
</div>
</div>

<button type="submit">Submit Application</button>
<div id="msg"></div>

</form>
</div>

<script>

// AGE AUTO CALCULATION
document.getElementById("birthday").addEventListener("change", function(){
let birth = new Date(this.value);
let today = new Date();
let age = today.getFullYear() - birth.getFullYear();
let m = today.getMonth() - birth.getMonth();
if(m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
document.getElementById("age").value = age + " years";
});

// VALIDATION + SUBMIT
document.getElementById("form").addEventListener("submit", function(e){
e.preventDefault();

let nic = document.getElementById("nic").value;
let mobile = document.getElementById("mobile").value;

if(!/^([0-9]{9}[vVxX]|[0-9]{12})$/.test(nic)){
document.getElementById("msg").innerHTML="<p class='error'>Invalid NIC Number</p>";
return;
}

if(!/^07[0-9]{8}$/.test(mobile)){
document.getElementById("msg").innerHTML="<p class='error'>Invalid Mobile Number</p>";
return;
}

const data = Object.fromEntries(new FormData(this).entries());

fetch("https://script.google.com/macros/s/AKfycbzeP8s3LoyA0hDYSxSnGbSjKinr0_GI2k2QF6XblZlZUw9-siC1d5FW7KjLhAjFChqKxg/exec",{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.text())
.then(()=>{
document.getElementById("msg").innerHTML="<p class='success'>Application Submitted Successfully</p>";
this.reset();
})
.catch(()=>{
document.getElementById("msg").innerHTML="<p class='error'>Submission Failed</p>";
});
});
</script>

</body>
</html>
